services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mta-brain-net
  api:
    restart: unless-stopped

  hydrator:
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
