services:
  api:
    build: .
    image: transit-brain-nyc:latest
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mta_brain
      - APP_DB_USER=${APP_DB_USER}
      - APP_DB_PASSWORD=${APP_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    networks:
      - mta-brain-net

  hydrator:
    build: .
    image: transit-brain-nyc:latest
    command: python -m services.subway_live_hydrator.runner
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mta-brain-net

  postgres:
    image: postgres:16-alpine
    shm_size: 128mb
    environment:
      - POSTGRES_DB=mta_brain
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mta_brain"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mta-brain-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mta-brain-net

  flyway:
    image: flyway/flyway
    container_name: mta-brain-flyway
    volumes:
      - ./sql:/flyway/sql
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - FLYWAY_USER=postgres
      - FLYWAY_PASSWORD=${DB_PASSWORD}
      - FLYWAY_PLACEHOLDERS_DB_NAME=${DB_NAME}
      - FLYWAY_PLACEHOLDERS_APP_USER=${APP_DB_USER}
      - FLYWAY_PLACEHOLDERS_APP_PASSWORD=${APP_DB_PASSWORD}
      - FLYWAY_LOCATIONS=filesystem:/flyway/sql
      - FLYWAY_CONNECT_RETRIES=60
    command: -baselineOnMigrate=true migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mta-brain-net

networks:
  mta-brain-net:
    driver: bridge

volumes:
  postgres_data:
