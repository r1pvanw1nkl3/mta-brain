name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Checks"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # ONLY run if the CI workflow actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to Hetzner
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".,!.git/,!.github/,!.venv/,!**/__pycache__/,!logs/,!tests/"
          target: "/root/mta-brain"
          rm: false

      - name: Create .env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/mta-brain
            cat <<'EOF' > .env
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            APP_DB_USER=app_user
            APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}
            ETL_DB_USER=etl_user
            ETL_DB_PASSWORD=${{ secrets.ETL_DB_PASSWORD }}
            DB_NAME=mta_brain
            REDIS_HOST=redis
            EOF

      - name: Restart Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /root/mta-brain

            echo "Step 1: Building latest images..."
            docker compose build api hydrator

            echo "Step 2: Starting Database and Redis..."
            docker compose up -d postgres redis caddy

            echo "Step 3: Syncing passwords and clearing locks..."
            # Wait for postgres to be ready
            until docker exec mta-brain-postgres-1 pg_isready -U postgres; do sleep 2; done

            # Update the etl_user password in the DB to match the secret, just in case the volume is old
            docker exec mta-brain-postgres-1 psql -U postgres -d mta_brain -c \
              "ALTER USER etl_user WITH PASSWORD '${{ secrets.ETL_DB_PASSWORD }}';" || true

            # Clear stale locks
            docker exec mta-brain-postgres-1 psql -U postgres -d mta_brain -c \
              "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'mta_brain' AND pid <> pg_backend_pid();" || true

            echo "Step 4: Running Migrations..."
            docker compose run --rm flyway

            echo "Step 5: Starting Application Services..."
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --remove-orphans api hydrator

            echo "Deployment Complete!"
            docker compose ps
