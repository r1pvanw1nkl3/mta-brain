name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: etl_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mta_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff (Lint & Format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Ty (Type Check)
        run: uv run ty check

      - name: Run Migrations
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway \
            -url=jdbc:postgresql://localhost:5432/mta_db_test \
            -user=etl_user \
            -password=password \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Run Pytest
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mta_db_test
          ETL_DB_USER: etl_user
          ETL_DB_PASSWORD: password
          APP_DB_USER: etl_user
          APP_DB_PASSWORD: password
        run: uv run pytest
